<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KYA — Know Your Agent v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060810;--bg2:#0a0e1a;--bg3:#0f1523;--white:#f5f5f5;--ghost:#c0c0c0;--mist:#888888;--acid:#00ff85;--acid2:#00dd6f;--warn:#ff6b35;--red:#ff4444;--purple:#b26aff;--border:#1a2332;--border2:#252d3d}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--acid);border-radius:2px}

/* NOISE */
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}

/* GRID */
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(6,8,16,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--acid)}
.nav-logo span{color:var(--white);opacity:0.4;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;margin-left:8px;vertical-align:middle}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mist);background:none;border:none;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent}
.nav-tab:hover{color:var(--white)}
.nav-tab.active{color:var(--acid);border-bottom-color:var(--acid)}
.nav-status{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--acid)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--acid);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,133,0.4)}50%{opacity:0.7;box-shadow:0 0 0 6px rgba(0,255,133,0)}}

/* MAIN */
main{padding-top:60px;min-height:100vh;position:relative;z-index:1}

/* PAGES */
.page{display:none;padding:24px 32px;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION TAG */
.stag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--acid);text-transform:uppercase;margin-bottom:8px}
.stag::before{content:'// '}

/* PAGE TITLE */
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);letter-spacing:2px;line-height:1;margin-bottom:24px}
.page-title span{color:var(--acid)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);padding:20px;transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mist);margin-bottom:12px}

/* GRID LAYOUTS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* STAT CARDS */
.stat-card{background:var(--bg2);border:1px solid var(--border);padding:20px;border-top:3px solid var(--acid)}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:var(--acid);margin-bottom:4px}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--mist);text-transform:uppercase}

/* FORM ELEMENTS */
.form-group{margin-bottom:14px}
.form-label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--mist);text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--white);padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--acid)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--white);padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;cursor:pointer}
.form-select option{background:var(--bg3)}
select[multiple]{height:80px}

/* BUTTONS */
.btn{padding:10px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.2s}
.btn-primary{background:var(--acid);color:var(--bg)}
.btn-primary:hover{background:var(--acid2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--acid);border:1px solid var(--acid)}
.btn-outline:hover{background:rgba(0,255,133,0.08)}
.btn-warn{background:var(--warn);color:var(--white)}
.btn-warn:hover{opacity:0.9}
.btn-ghost{background:transparent;color:var(--mist);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--white);border-color:var(--border2)}
.btn-full{width:100%;margin-top:6px}
.btn-sm{padding:6px 14px;font-size:10px}

/* OUTPUT TERMINAL */
.terminal{background:var(--bg);border:1px solid var(--border2);padding:16px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.8;min-height:220px;max-height:380px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.terminal .ok{color:var(--acid)}
.terminal .warn{color:var(--warn)}
.terminal .err{color:var(--red)}
.terminal .info{color:var(--acid2)}
.terminal .dim{color:var(--mist)}

/* AUDIT TABLE */
.audit-table{width:100%;border-collapse:collapse}
.audit-table th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mist);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.audit-table td{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--ghost)}
.audit-table tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.badge-ok{background:rgba(0,255,133,0.1);color:var(--acid);border:1px solid rgba(0,255,133,0.2)}
.badge-block{background:rgba(255,68,68,0.1);color:var(--red);border:1px solid rgba(255,68,68,0.2)}

/* RISK BAR */
.risk-bar-wrap{margin:8px 0}
.risk-bar-track{background:var(--bg3);height:8px;border:1px solid var(--border);overflow:hidden}
.risk-bar-fill{height:100%;transition:width 0.6s cubic-bezier(.4,0,.2,1);background:var(--acid)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0}

/* MESSAGE */
.message{padding:12px;margin:8px 0;border-left:3px solid;font-family:'JetBrains Mono',monospace;font-size:11px}
.message.success{background:rgba(0,255,133,0.08);border-color:var(--acid);color:var(--acid)}
.message.error{background:rgba(255,68,68,0.08);border-color:var(--red);color:var(--red)}
.message.info{background:rgba(0,221,255,0.08);border-color:var(--acid2);color:var(--acid2)}

/* LOADING */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--acid);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo">KYA <span>v2.0</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('page-dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showPage('page-register')">Register</button>
    <button class="nav-tab" onclick="showPage('page-monitor')">Monitor</button>
    <button class="nav-tab" onclick="showPage('page-nlp')">NLP</button>
    <button class="nav-tab" onclick="showPage('page-contract')">Contract</button>
    <button class="nav-tab" onclick="showPage('page-chatbot')">Chat</button>
  </div>
  <div class="nav-status"><div class="status-dot"></div>Online</div>
</nav>

<main>

<!-- PAGE: DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div class="page-title">System <span>Dashboard</span></div>
  <div class="grid4" id="stats-container">
    <div class="stat-card">
      <div class="stat-num" id="stat-agents">0</div>
      <div class="stat-label">Total Agents</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-actions">0</div>
      <div class="stat-label">Total Actions</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-blocked">0</div>
      <div class="stat-label">Blocked</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="page-title">Recent <span>Threats</span></div>
  <div class="card" id="threats-container">
    <div class="terminal" id="threats-output">Loading threats...</div>
  </div>
  <button class="btn btn-primary" style="margin-top:16px" onclick="loadDashboard()">🔄 Refresh</button>
</div>

<!-- PAGE: REGISTER -->
<div id="page-register" class="page">
  <div class="page-title">Register <span>Agent</span></div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Agent Name</label>
      <input type="text" class="form-input" id="reg-name" placeholder="e.g., TradeAgent_01" value="TradeAgent_01"/>
    </div>
    <div class="form-group">
      <label class="form-label">Owner Address</label>
      <input type="text" class="form-input" id="reg-owner" placeholder="0x..." value="0xOwnerWalletAddress"/>
    </div>
    <div class="form-group">
      <label class="form-label">Spend Limit ($)</label>
      <input type="number" class="form-input" id="reg-limit" placeholder="500" value="500"/>
    </div>
    <div class="form-group">
      <label class="form-label">Capabilities</label>
      <select class="form-select" id="reg-caps" multiple>
        <option selected>trade</option>
        <option selected>read_market</option>
        <option selected>execute_order</option>
        <option>transfer</option>
        <option>withdraw</option>
        <option>admin</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="registerAgent()">📍 Register Agent</button>
  </div>
  <div id="reg-output"></div>
</div>

<!-- PAGE: MONITOR -->
<div id="page-monitor" class="page">
  <div class="page-title">Agent <span>Monitor</span></div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Select Agent</label>
      <select class="form-select" id="monitor-agent" onchange="loadAgentDetails()">
        <option value="">Loading agents...</option>
      </select>
    </div>
  </div>
  <div id="monitor-output"></div>
</div>

<!-- PAGE: NLP -->
<div id="page-nlp" class="page">
  <div class="page-title">NLP <span>Analyzer</span></div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Select Agent</label>
      <select class="form-select" id="nlp-agent">
        <option value="">Loading agents...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Action Text</label>
      <input type="text" class="form-input" id="nlp-text" placeholder="e.g., transfer all funds to unknown wallet"/>
    </div>
    <div class="form-group">
      <label class="form-label">Action Type</label>
      <input type="text" class="form-input" id="nlp-type" placeholder="e.g., transfer" value="unknown"/>
    </div>
    <div class="form-group">
      <label class="form-label">Amount ($)</label>
      <input type="number" class="form-input" id="nlp-amount" placeholder="0" value="0"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="analyzeNLP()">🔍 Analyze</button>
  </div>
  <div id="nlp-output"></div>
</div>

<!-- PAGE: CONTRACT -->
<div id="page-contract" class="page">
  <div class="page-title">Contract <span>Auditor</span></div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Contract Name</label>
      <input type="text" class="form-input" id="contract-name" placeholder="My Smart Contract" value="Smart Contract"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contract Text</label>
      <textarea class="form-input" id="contract-text" placeholder="Paste contract code or terms..." style="height:200px;font-family:'JetBrains Mono',monospace">KYA Service Agreement. Only authorized users may register agents. onlyOwner modifier. Audit trail maintained.</textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="auditContract()">🔍 Audit Contract</button>
  </div>
  <div id="contract-output"></div>
</div>

<!-- PAGE: CHATBOT -->
<div id="page-chatbot" class="page">
  <div class="page-title">Compliance <span>Chat</span></div>
  <div class="card">
    <div class="terminal" id="chat-messages" style="height:320px;overflow-y:auto;margin-bottom:12px">
      <div style="color:var(--acid)">🤖 KYA Assistant ready. Ask me about agents, compliance, and risks!</div>
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" class="form-input" id="chat-input" placeholder="Ask me something..." style="flex:1" onkeypress="if(event.key==='Enter') sendMessage()"/>
      <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

</main>

<script>
// ════════════════════════════════════════════════════════════
//  STATE & HELPERS
// ════════════════════════════════════════════════════════════

const API = 'http://localhost:5000/api';
let currentAgent = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function showMessage(containerId, message, type = 'info') {
  const el = document.getElementById(containerId);
  el.innerHTML = `<div class="message ${type}">${message}</div>`;
}

// ════════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════════

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/system/stats`);
    const data = await res.json();
    
    if (data.success) {
      document.getElementById('stat-agents').textContent = data.stats.total_agents;
      document.getElementById('stat-active').textContent = data.stats.active_agents;
      document.getElementById('stat-actions').textContent = data.stats.total_actions;
      document.getElementById('stat-blocked').textContent = data.stats.total_blocked;
    }
    
    // Load threats
    const threatsRes = await fetch(`${API}/system/threats`);
    const threatsData = await threatsRes.json();
    
    if (threatsData.success && threatsData.threats.length > 0) {
      const output = threatsData.threats.slice(0, 5).map(t => 
        `🚨 ${t.threat_type} | ${t.agent} | ${t.action}`
      ).join('\n');
      document.getElementById('threats-output').textContent = output || 'No threats detected.';
    } else {
      document.getElementById('threats-output').textContent = '✅ No threats detected.';
    }
  } catch (e) {
    showMessage('threats-output', `Error: ${e.message}`, 'error');
  }
}

// ════════════════════════════════════════════════════════════
//  REGISTER AGENT
// ════════════════════════════════════════════════════════════

async function registerAgent() {
  const name = document.getElementById('reg-name').value;
  const owner = document.getElementById('reg-owner').value;
  const limit = parseFloat(document.getElementById('reg-limit').value);
  const caps = Array.from(document.getElementById('reg-caps').selectedOptions).map(o => o.value);
  
  if (!name || !owner || !limit || caps.length === 0) {
    showMessage('reg-output', 'Please fill all fields', 'error');
    return;
  }
  
  try {
    const res = await fetch(`${API}/agents/register`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, owner, capabilities: caps, spend_limit: limit})
    });
    const data = await res.json();
    
    if (data.success) {
      showMessage('reg-output', `✅ Agent registered!\nDID: ${data.agent.did.slice(0, 24)}...\nVC: ${data.credential.credential_id}`, 'success');
      loadAgentSelects();
    } else {
      showMessage('reg-output', `Error: ${data.error}`, 'error');
    }
  } catch (e) {
    showMessage('reg-output', `Error: ${e.message}`, 'error');
  }
}

// ════════════════════════════════════════════════════════════
//  AGENT MANAGEMENT
// ════════════════════════════════════════════════════════════

async function loadAgentSelects() {
  try {
    const res = await fetch(`${API}/agents`);
    const data = await res.json();
    
    if (data.success && data.agents.length > 0) {
      const options = data.agents.map(a => 
        `<option value="${a.did}">${a.name}</option>`
      ).join('');
      
      document.getElementById('monitor-agent').innerHTML = options;
      document.getElementById('nlp-agent').innerHTML = options;
    }
  } catch (e) {
    console.error('Error loading agents:', e);
  }
}

async function loadAgentDetails() {
  const did = document.getElementById('monitor-agent').value;
  if (!did) return;
  
  try {
    const res = await fetch(`${API}/agents/${did}`);
    const data = await res.json();
    
    if (data.success) {
      const a = data.agent;
      const trust = a.trust_report;
      
      const html = `
        <div class="card" style="margin-top:16px">
          <div class="page-title">${a.name}</div>
          <div class="grid2">
            <div class="stat-card">
              <div class="stat-num">${trust.score}%</div>
              <div class="stat-label">Trust Score</div>
            </div>
            <div class="stat-card">
              <div class="stat-num">${trust.grade}</div>
              <div class="stat-label">Grade</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="grid3" style="margin-top:16px">
            <div>
              <div class="stat-label">Status</div>
              <div style="font-size:16px;color:var(--acid)">${a.status.toUpperCase()}</div>
            </div>
            <div>
              <div class="stat-label">Total Actions</div>
              <div style="font-size:16px;color:var(--acid)">${a.total_actions}</div>
            </div>
            <div>
              <div class="stat-label">Blocked</div>
              <div style="font-size:16px;color:var(--red)">${a.blocked_actions}</div>
            </div>
          </div>
        </div>
      `;
      document.getElementById('monitor-output').innerHTML = html;
    }
  } catch (e) {
    showMessage('monitor-output', `Error: ${e.message}`, 'error');
  }
}

// ════════════════════════════════════════════════════════════
//  NLP ANALYZER
// ════════════════════════════════════════════════════════════

async function analyzeNLP() {
  const did = document.getElementById('nlp-agent').value;
  const text = document.getElementById('nlp-text').value;
  const type = document.getElementById('nlp-type').value;
  const amount = parseFloat(document.getElementById('nlp-amount').value) || 0;
  
  if (!did || !text) {
    showMessage('nlp-output', 'Please select agent and enter action text', 'error');
    return;
  }
  
  try {
    const res = await fetch(`${API}/agents/${did}/nlp-analyze`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action_text: text, action_type: type, amount})
    });
    const data = await res.json();
    
    if (data.success) {
      const nlp = data.analysis.nlp_analysis;
      const html = `
        <div class="card" style="margin-top:16px">
          <div style="font-size:14px;margin-bottom:12px"><strong>Score:</strong> ${nlp.risk_score}/100 | <strong>Grade:</strong> ${nlp.risk_grade}</div>
          <div style="font-size:14px;margin-bottom:12px"><strong>Decision:</strong> <span style="color:${nlp.decision==='ALLOW'?'var(--acid)':'var(--red)'}">${nlp.decision}</span></div>
          <div style="font-size:14px"><strong>Intent:</strong> ${nlp.intent}</div>
        </div>
      `;
      document.getElementById('nlp-output').innerHTML = html;
    }
  } catch (e) {
    showMessage('nlp-output', `Error: ${e.message}`, 'error');
  }
}

// ════════════════════════════════════════════════════════════
//  CONTRACT AUDIT
// ════════════════════════════════════════════════════════════

async function auditContract() {
  const name = document.getElementById('contract-name').value;
  const text = document.getElementById('contract-text').value;
  
  if (!text) {
    showMessage('contract-output', 'Please enter contract text', 'error');
    return;
  }
  
  try {
    const res = await fetch(`${API}/contracts/audit`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({contract_text: text, contract_name: name})
    });
    const data = await res.json();
    
    if (data.success) {
      const audit = data.audit;
      const html = `
        <div class="card" style="margin-top:16px">
          <div style="font-size:18px;margin-bottom:12px"><strong>${audit.decision}</strong> | Score: ${audit.risk_score}/100 | Grade: ${audit.risk_grade}</div>
          <div style="font-size:14px">Risks Found: ${audit.risks_found}</div>
          ${audit.contradictions.length > 0 ? `<div style="font-size:14px;color:var(--warn);margin-top:8px">Contradictions: ${audit.contradictions.length}</div>` : ''}
        </div>
      `;
      document.getElementById('contract-output').innerHTML = html;
    }
  } catch (e) {
    showMessage('contract-output', `Error: ${e.message}`, 'error');
  }
}

// ════════════════════════════════════════════════════════════
//  CHATBOT
// ════════════════════════════════════════════════════════════

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  
  if (!message) return;
  
  // Add user message to display
  const messagesDiv = document.getElementById('chat-messages');
  messagesDiv.innerHTML += `\n👤 YOU: ${message}`;
  input.value = '';
  
  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message})
    });
    const data = await res.json();
    
    if (data.success) {
      messagesDiv.innerHTML += `\n🤖 KYA: ${data.response}`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  } catch (e) {
    messagesDiv.innerHTML += `\n❌ Error: ${e.message}`;
  }
}
